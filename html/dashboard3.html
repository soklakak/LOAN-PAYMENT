<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/table.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
body {
    background-color: #f4f6f9;
}

/* Card form */
.form-box {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Inputs */
.form-control {
    border-radius: 10px;
}

/* Number buttons */
.box-btn {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    font-size: 25px;
    color: white;
    border: none;
}

.btn-1 { background: #ff2e63; }
.btn-2 { background: #28c76f; }
.btn-3 { background: #f9f871; color: black; }


/* Center section */
.center-box {
    text-align: center;
    margin-top: 40px;
}
.loding{
    background-color: rgb(0, 0,0,0.5);
    width: 100%;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    
}
.snip{
    
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border:6px solid whitesmoke;
    border-top: 6px solid chartreuse;
    animation: span 1s linear infinite;

}
@keyframes span{
  100%{transform: rotate(360deg);}
}
</style>

</head>
<body>

<div class="container mt-5">
    <!-- arrow -->
     <div id="arrow" onclick="go_nav()" class="arrow " style="position:relative; right: 150px; top: 30px;  font-size: 1.5rem;"><i class="fa-solid fa-arrow-left"></i></div>
    <!-- Form -->
    <div class="form-box">
        <div class="row g-3">

            <div class="col-md-6">
                <label>Last Name</label>
                <input type="text" class="form-control" id="lest">
            </div>

            <div class="col-md-6">
                <label>First Name</label>
                <input type="text" class="form-control" id="frist">
            </div>

            <div class="col-md-6">
                <label>Duration</label>
                <input type="text" class="form-control" id="txtmoth">
            </div>

            <div class="col-md-6">
                <label>Date</label>
                <input type="date" class="form-control" id="date">
            </div>

            <div class="col-md-6">
                <label>Amount</label>
                <input type="number" class="form-control" id="amount">
            </div>

            <div class="col-md-6">
                <label>Interest</label>
                <input type="number" class="form-control" id="interest" >
            </div>

        </div>
    </div>

    

    <!-- Buttons -->
    <div class="center-box">
       

        <div class="mt-4">
            <button class="btn btn-primary px-4" id="show" onclick="show()">Show</button>
        </div>
        <!-- loding -->
         <div class="loding" style="display: none;" id="lod">
            <div class="snip" ></div>
         </div>
    </div>

    <table id="mytable" border="1"></table>

</div>

</body>
<script src="/js/dashboard3.js"></script>

</html>
