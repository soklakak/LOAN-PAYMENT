<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
</body>
<script>
    let n=7;
    let amt = 7000;
    let last_amt = amt;
    for(let i=1 ;i<=n;i++){
        if(i%3 == 0){
            let amt1 = (amt/n)*3;
            last_amt = last_amt-amt1;
            document.write(`${amt1}<br>`);
            
        }
        else{
            if(i==n){
               
                document.write(`${last_amt}<br>`);
            }
            else{
                document.write(`0<br>`);
            }
        }
            
        
    } 
</script>
</html>
